name: Core validation

# Out-of-band check that the upstream port still folds onto the LATEST Home
# Assistant core `dev`. It is not run on every push; it runs on demand and
# weekly.
#
# What it proves:
#   The custom component's feature folds into upstream as a mechanical
#   "project + copy + wire" operation against current core dev:
#     1. Project the two shared files into core layout (scripts/port_to_core.py).
#     2. Apply the four small wiring edits (scripts/core-wiring.patch).
#     3. Byte-compile the folded homekit component on the Python version core
#        targets, proving it is syntactically valid on current dev.
#
# What a failure means:
#   - Patch step fails   -> core `dev` moved under the wiring edits; regenerate
#     scripts/core-wiring.patch from the fork (this is the intended drift signal).
#   - Compile step fails -> core changed something the folded component relies on;
#     update the shared files and/or the port before the next upstream sync.
#
# Behavioural validation lives elsewhere and is intentionally not duplicated
# here: this repository's own test suite runs on every push, and the container
# harness at github.com/teh-hippo/ha-test-harness exercises the running
# accessory end to end.

on:
  workflow_dispatch:
  schedule:
    # Mondays 06:00 UTC. Weekly is enough to catch core drift.
    - cron: "0 6 * * 1"

concurrency:
  group: core-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CORE_REPO: home-assistant/core
  CORE_REF: dev

jobs:
  validate:
    name: Validate port against core dev
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out this repository (port script + wiring patch)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Check out home-assistant/core dev
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: ${{ env.CORE_REPO }}
          ref: ${{ env.CORE_REF }}
          path: core

      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          python-version: "3.14"

      - name: Project the shared files into core layout
        run: uv run --no-project python scripts/port_to_core.py --out core/homeassistant/components/homekit

      - name: Apply the core wiring patch
        run: |
          set -euo pipefail
          if ! git -C core apply --verbose "${GITHUB_WORKSPACE}/scripts/core-wiring.patch"; then
            echo "::error::scripts/core-wiring.patch did not apply to current" \
              "${CORE_REPO}@${CORE_REF}. The wiring has drifted upstream;" \
              "regenerate the patch from the fork before the next port." >&2
            exit 1
          fi

      - name: Compile-check the folded homekit component on core dev
        # Byte-compiles the projected shared files and the four wired core
        # modules on the Python version core targets. No integration deps are
        # installed: this is a fast, robust structural check that the fold stays
        # mechanical and valid, not a behavioural one.
        run: uv run --no-project python -m compileall -q core/homeassistant/components/homekit
