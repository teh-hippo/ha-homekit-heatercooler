name: Validate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: validate-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: home-assistant/actions/hassfest@f6f29a7ee3fa0eccadf3620a7b9ee00ab54ec03b  # master pinned 2026-05-07

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: HACS validation
        uses: hacs/action@dcb30e72781db3f207d5236b861172774ab0b485  # main pinned 2026-05-07
        with:
          category: integration
          comment: false
          github_token: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.14"
      - run: uv sync --locked
      - run: uv run --no-sync ruff check .
      - run: uv run --no-sync ruff format --check .

  mypy:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.14"
      - run: uv sync --locked
      - run: uv run --no-sync mypy custom_components/homekit_heatercooler

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.14"
      - run: uv sync --locked
      - run: uv run --no-sync coverage run -m pytest tests/ -v --tb=short
      - run: uv run --no-sync coverage report --include="custom_components/homekit_heatercooler/*" --fail-under=70

  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.14"
      - run: uv sync --locked
      - run: uv run --no-sync python -m compileall custom_components

  drift:
    name: Core drift
    runs-on: ubuntu-latest
    # Guards that the two shared HomeKit files still project cleanly onto the
    # upstream fork. This is the check that keeps the custom component and the
    # upstream patch from diverging: it fetches the fork's copies of the two
    # shared files and asserts that projecting the custom component's copies
    # (scripts/port_to_core.py) reproduces them byte-for-byte. Anything beyond
    # the documented delta (absolute->relative imports, the fan_lane extension)
    # fails the job. Fast by design: it only fetches two files and compares.
    env:
      FORK_REPO: teh-hippo/core
      FORK_REF: feat/homekit-heatercooler-optin
      FORK_HOMEKIT_DIR: homeassistant/components/homekit
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.14"
      - name: Fetch the fork's shared HomeKit files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p fork-shared
          for f in type_heatercooler.py climate_util.py; do
            echo "Fetching ${FORK_REPO}@${FORK_REF}:${FORK_HOMEKIT_DIR}/${f}"
            if ! gh api \
              "repos/${FORK_REPO}/contents/${FORK_HOMEKIT_DIR}/${f}?ref=${FORK_REF}" \
              --jq '.content' | base64 -d > "fork-shared/${f}"; then
              echo "::error::Could not fetch ${f} from ${FORK_REPO}@${FORK_REF}." \
                "The drift check cannot run. Check the repo/branch/token." >&2
              exit 1
            fi
            if [ ! -s "fork-shared/${f}" ]; then
              echo "::error::Fetched ${f} is empty; refusing to compare." >&2
              exit 1
            fi
          done
      - name: Assert the custom component projects onto the fork
        # port_to_core.py --check exits non-zero and prints a diff on any
        # divergence beyond the documented delta.
        run: uv run --no-project python scripts/port_to_core.py --check fork-shared
